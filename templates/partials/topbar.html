{% load static %}

<header id="page-topbar">
    <div class="navbar-header">
        <!-- Left side -->
        <div class="d-flex align-items-center">
            <div class="navbar-brand-box">
                <a href="{% url 'dashboard' %}" class="logo logo-dark">
                    <span class="logo-sm"><span class="fw-bold text-primary fs-5">N</span></span>
                    <span class="logo-lg"><span class="fw-bold text-primary fs-4">Nav</span><span class="fw-bold text-dark fs-4">IMS</span></span>
                </a>
            </div>

            <button type="button" class="topbar-hamburger" data-toggle="sidebar" id="topnav-hamburger-icon">
                <span class="hamburger-icon"><span></span></span>
            </button>

            <div class="app-search d-none d-md-block">
                <div class="position-relative">
                    <input type="text" class="form-control" placeholder="Search..." autocomplete="off">
                    <span class="search-icon"><i class="ri-search-line"></i></span>
                </div>
            </div>
        </div>

        <!-- Right side -->
        <div class="d-flex align-items-center">
            <div class="d-md-none header-item">
                <button type="button" class="btn btn-icon btn-topbar rounded-circle" data-bs-toggle="dropdown">
                    <i class="ri-search-line fs-16"></i>
                </button>
                <div class="dropdown-menu dropdown-menu-lg dropdown-menu-end p-0">
                    <form class="p-3" onsubmit="return false;">
                        <div class="input-group">
                            <input type="text" class="form-control" placeholder="Search...">
                            <button class="btn btn-primary" type="submit"><i class="ri-search-line"></i></button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="header-item d-none d-sm-flex">
                <button type="button" class="btn btn-icon btn-topbar rounded-circle light-dark-mode" id="light-dark-mode-btn" title="Toggle theme">
                    <i class="ri-moon-line fs-16" id="theme-icon-dark"></i>
                    <i class="ri-sun-line fs-16 d-none" id="theme-icon-light"></i>
                </button>
            </div>

            <div class="header-item d-none d-sm-flex">
                <button type="button" class="btn btn-icon btn-topbar rounded-circle" data-toggle="fullscreen" title="Toggle fullscreen">
                    <i class="ri-fullscreen-line fs-16"></i>
                </button>
            </div>

            <div class="dropdown topbar-head-dropdown header-item" id="notificationDropdown">
                <button type="button" class="btn btn-icon btn-topbar rounded-circle" id="page-header-notifications-dropdown" data-bs-toggle="dropdown" data-bs-auto-close="outside">
                    <i class="ri-notification-3-line fs-16"></i>
                    <span class="position-absolute topbar-badge fs-10 translate-middle badge rounded-pill bg-danger">
                        <span class="notification-count">0</span>
                        <span class="visually-hidden">unread notifications</span>
                    </span>
                </button>
                <div class="dropdown-menu dropdown-menu-lg dropdown-menu-end p-0">
                    <div class="dropdown-head bg-primary bg-pattern rounded-top">
                        <div class="p-3">
                            <div class="row align-items-center">
                                <div class="col"><h6 class="m-0 fs-14 fw-semibold text-white">Notifications</h6></div>
                                <div class="col-auto"><span class="badge bg-light-subtle text-body notification-count-badge">0 New</span></div>
                            </div>
                        </div>
                    </div>
                    <div class="py-2 ps-2" id="notificationItemsTabContent">
                        <div data-simplebar style="max-height: 300px;" class="pe-2" id="notificationItemsBody">
                            <div class="text-center text-muted py-4" id="notificationEmptyState">
                                <i class="ri-notification-off-line fs-24 mb-2 d-block"></i>
                                <p class="mb-0">No new notifications</p>
                            </div>
                        </div>
                    </div>
                    <div class="notification-actions p-2 border-top border-light text-center">
                        <a class="btn btn-sm btn-soft-primary w-100" href="{% url 'alerts_notifications:alert_list' %}">
                            View All Notifications <i class="ri-arrow-right-s-line align-middle"></i>
                        </a>
                    </div>
                </div>
            </div>

            <div class="dropdown header-item topbar-user">
                <button type="button" class="btn" id="page-header-user-dropdown" data-bs-toggle="dropdown">
                    <span class="d-flex align-items-center">
                        <span class="rounded-circle header-profile-user bg-primary text-white d-flex align-items-center justify-content-center" style="width: 32px; height: 32px; font-size: 14px;">
                            {% if user.first_name %}{{ user.first_name|first|upper }}{% else %}<i class="ri-user-3-line"></i>{% endif %}
                        </span>
                        <span class="text-start ms-xl-2 d-none d-xl-inline-block">
                            <span class="d-block fw-medium user-name-text fs-13">
                                {% if user.get_full_name %}{{ user.get_full_name }}{% else %}{{ user.username|default:"User" }}{% endif %}
                            </span>
                            <span class="d-block fs-11 text-muted user-name-sub-text">
                                {% if user.is_superuser %}Super Admin{% elif user.is_tenant_admin %}Admin{% else %}User{% endif %}
                            </span>
                        </span>
                    </span>
                </button>
                <div class="dropdown-menu dropdown-menu-end">
                    <h6 class="dropdown-header">Welcome {{ user.first_name|default:user.username }}!</h6>
                    <a class="dropdown-item" href="{% url 'accounts:profile' %}">
                        <i class="ri-user-3-line text-muted fs-16 align-middle me-1"></i>
                        <span class="align-middle">Profile</span>
                    </a>
                    <a class="dropdown-item" href="{% url 'accounts:profile' %}">
                        <i class="ri-settings-4-line text-muted fs-16 align-middle me-1"></i>
                        <span class="align-middle">Settings</span>
                    </a>
                    <div class="dropdown-divider"></div>
                    <a class="dropdown-item text-danger" href="{% url 'accounts:logout' %}" onclick="event.preventDefault(); document.getElementById('logout-form').submit();">
                        <i class="ri-logout-box-r-line text-danger fs-16 align-middle me-1"></i>
                        <span class="align-middle">Logout</span>
                    </a>
                    <form id="logout-form" action="{% url 'accounts:logout' %}" method="POST" class="d-none">
                        {% csrf_token %}
                    </form>
                </div>
            </div>

            <div class="header-item d-none d-sm-flex">
                <button type="button" class="btn btn-icon btn-topbar rounded-circle" data-bs-toggle="offcanvas" data-bs-target="#theme-settings-offcanvas" title="Settings">
                    <i class="ri-settings-3-line fs-16 animate-spin-slow"></i>
                </button>
            </div>
        </div>
    </div>
</header>

{% if user.is_authenticated %}
<script>
(function () {
    var inboxUrl = "{% url 'alerts_notifications:alert_inbox_json' %}";
    function severityIcon(sev) {
        if (sev === 'critical') return '<i class="ri-alarm-warning-line fs-18 text-danger"></i>';
        if (sev === 'warning')  return '<i class="ri-error-warning-line fs-18 text-warning"></i>';
        return '<i class="ri-notification-2-line fs-18 text-info"></i>';
    }
    function escapeHtml(s) {
        return String(s || '').replace(/[&<>"']/g, function (c) {
            return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
        });
    }
    function hydrate() {
        fetch(inboxUrl, { credentials: 'same-origin', headers: { 'Accept': 'application/json' } })
            .then(function (r) { return r.ok ? r.json() : null; })
            .then(function (data) {
                if (!data) return;
                var count = data.unread_count || 0;
                document.querySelectorAll('.notification-count').forEach(function (el) { el.textContent = count; });
                var badge = document.querySelector('.notification-count-badge');
                if (badge) badge.textContent = count + ' New';
                var body = document.getElementById('notificationItemsBody');
                if (!body) return;
                if (!data.items || data.items.length === 0) {
                    body.innerHTML = '<div class="text-center text-muted py-4"><i class="ri-notification-off-line fs-24 mb-2 d-block"></i><p class="mb-0">No new notifications</p></div>';
                    return;
                }
                var html = '';
                data.items.forEach(function (a) {
                    html += '<a href="' + escapeHtml(a.url) + '" class="dropdown-item py-2">'
                         +   '<div class="d-flex">'
                         +     '<div class="flex-shrink-0 me-2">' + severityIcon(a.severity) + '</div>'
                         +     '<div class="flex-grow-1">'
                         +       '<p class="mb-0 fw-medium">' + escapeHtml(a.title) + '</p>'
                         +       '<small class="text-muted">' + escapeHtml(a.alert_type_display) + ' &middot; ' + escapeHtml(a.alert_number) + '</small>'
                         +     '</div>'
                         +   '</div>'
                         + '</a>';
                });
                body.innerHTML = html;
            })
            .catch(function () { /* silent — bell just shows last-known state */ });
    }
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', hydrate);
    } else {
        hydrate();
    }
})();
</script>
{% endif %}
