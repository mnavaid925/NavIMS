[pytest]
DJANGO_SETTINGS_MODULE = config.settings_test
python_files = tests.py test_*.py *_tests.py
addopts = -ra -q --strict-markers
testpaths = catalog/tests vendors/tests receiving/tests purchase_orders/tests warehousing/tests inventory/tests stock_movements/tests lot_tracking/tests orders/tests stocktaking/tests returns/tests forecasting/tests multi_location/tests barcode_rfid/tests quality_control/tests alerts_notifications/tests reporting/tests accounting/tests
filterwarnings =
    ignore::DeprecationWarning
